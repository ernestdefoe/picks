    settings:
      locking_title: Pick Locking
      nav_label: Sidebar nav label
      nav_label_help: The name shown in the forum sidebar navigation. Default is "Picks".
      lock_offset: Lock picks before kickoff
      lock_offset_help: Set to 0 to lock picks exactly at kickoff. Increase to require picks be submitted earlier.
      minutes_before_kickoff: minutes before kickoff
      minutes: minutes
      auto_unlock_weeks: Automatically unlock the next week when the previous week is complete
      auto_unlock_weeks_help: When enabled, the next week will automatically open for picks once all games in the current week have a result entered.
      auto_unlock_weeks_note: "Week 1 must always be opened manually. Subsequent weeks unlock automatically when all games in the previous week are finished."
      display_title: Display
      default_week_view: Default week on Picks page
      week_view_current: Current week (auto-detect)
      week_view_first: Always show Week 1
      default_week_view_help: What week users see when they first open the Picks page.
      confidence_title: Confidence Mode
      confidence_enabled: Enable confidence ratings (1–10 per pick)
      confidence_help: When enabled, users rate their confidence in each pick from 1 to 10. Correct picks score their confidence value as points instead of 1 point each.
      confidence_penalty: Penalty for incorrect high-confidence picks
      penalty_none: No penalty
      penalty_half: Soft penalty (lose half confidence value)
      penalty_full: Full penalty (lose full confidence value)
      penalty_none_help: Incorrect picks score 0 points regardless of confidence. No risk, but also no incentive to be accurate with ratings.
      penalty_half_help: "Incorrect picks deduct half their confidence value (rounded down). Example: confidence 8 wrong = −4 pts. Balanced risk/reward."
      penalty_full_help: "Incorrect picks deduct their full confidence value. Example: confidence 8 wrong = −8 pts. High risk, high reward — rewards accuracy."

      polling_title: Live Score Polling
      espn_polling_enabled: Enable ESPN live score polling
      espn_polling_help: When enabled, the server will poll ESPN every 5 minutes on game days to update live scores automatically.
      polling_note: Live polling runs via the server scheduler every 5 minutes. Requires schedule:work to be running (Supervisor). Enable this only during the season.

